function renderLeads(filter = null) {
  let data = leadsData;
  if (filter) {
    const typeFilter = document.querySelector('select:nth-of-type(1)').value;
    const statusFilter = document.querySelector('select:nth-of-type(2)').value;
    const searchText = document.querySelector('input[type="text"]').value.toLowerCase();
    if (typeFilter) data = data.filter(l => l.type === typeFilter);
    if (statusFilter) data = data.filter(l => l.status === statusFilter);
    if (searchText) data = data.filter(l => l.title.toLowerCase().includes(searchText) || l.author.toLowerCase().includes(searchText));
  }

  const tbody = document.getElementById('leadsTableBody');
  tbody.innerHTML = data.map(lead => `
    <tr class="lead-row border-b border-gray-100 hover:bg-purple-50/30 cursor-pointer" onclick="openDetail(${lead.id})">
      <td class="px-4 py-3" onclick="event.stopPropagation()"><input type="checkbox" class="rounded"></td>
      <td class="px-4 py-3">
        <div class="text-sm font-medium text-gray-900 line-clamp-1 max-w-[400px]">${lead.title}</div>
      </td>
      <td class="px-4 py-3 text-sm text-gray-600">${lead.author}</td>
      <td class="px-4 py-3">
        <span class="text-xs font-medium text-${lead.type === '找资源' ? 'orange' : lead.type === '咨询求助' ? 'blue' : lead.type === '经验分享' ? 'gray' : 'green'}-600">${lead.type}</span>
      </td>
      <td class="px-4 py-3 text-sm text-gray-500">${lead.time}</td>
      <td class="px-4 py-3"><span class="status-badge ${lead.statusClass}">${lead.status}</span></td>
      <td class="px-4 py-3" onclick="event.stopPropagation()">
        <button class="px-3 py-1 text-xs font-medium text-primary border border-primary rounded-full hover:bg-primary hover:text-white transition-colors" onclick="quickChangeStatus(${lead.id})">标记</button>
      </td>
    </tr>
  `).join('');
}

function filterLeads() { renderLeads(true); }

function resetFilters() {
  document.querySelector('input[type="text"]').value = '';
  document.querySelectorAll('select').forEach(s => s.selectedIndex = 0);
  document.querySelector('input[type="date"]').value = '';
  renderLeads();
}

function toggleSelectAll() {
  const boxes = document.querySelectorAll('#leadsTableBody input[type="checkbox"]');
  const allChecked = Array.from(boxes).every(b => b.checked);
  boxes.forEach(b => b.checked = !allChecked);
}

function closeDetail() {
  document.getElementById('detailDrawer').classList.add('translate-x-full');
  document.getElementById('detailOverlay').classList.add('hidden');
  document.body.style.overflow = '';
}

function quickChangeStatus(id) {
  const lead = leadsData.find(l => l.id === id);
  const statuses = ['新线索', '已查看', '已联系', '已转化', '无效'];
  const currentIdx = statuses.indexOf(lead.status);
  const nextIdx = (currentIdx + 1) % statuses.length;
  lead.status = statuses[nextIdx];
  const statusClassMap = {
    '新线索': 'bg-blue-50 text-blue-700',
    '已查看': 'bg-yellow-50 text-yellow-700',
    '已联系': 'bg-green-50 text-green-700',
    '已转化': 'bg-purple-50 text-purple-700',
    '无效': 'bg-gray-50 text-gray-500',
  };
  lead.statusClass = statusClassMap[lead.status];
  renderLeads();
  showToast(`已标记为「${lead.status}」`, 'success');
}

function toggleCollectModal() {
  const overlay = document.getElementById('collectOverlay');
  overlay.classList.toggle('hidden');
}

function manualCollect() {
  toggleCollectModal();
  showToast('采集任务已下发，预计3-5分钟完成', 'success');
}

function exportLeads() {
  showToast('正在生成 Excel 文件，请稍候...', 'success');
}

function showToast(message, type = 'success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `px-5 py-3 rounded-lg text-white text-sm font-medium shadow-lg transition-all duration-300 translate-x-full ${type === 'success' ? 'bg-green-500' : 'bg-red-500'}`;
  toast.textContent = message;
  container.appendChild(toast);
  requestAnimationFrame(() => toast.classList.remove('translate-x-full'));
  setTimeout(() => {
    toast.classList.add('translate-x-full');
    setTimeout(() => toast.remove(), 300);
  }, 2500);
}

// Init
renderLeads();
