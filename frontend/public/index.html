<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海外营销线索平台</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = { theme: { extend: { colors: { primary: '#7C3AED', 'pri-light': '#A78BFA', 'pri-dark': '#6D28D9', cta: '#F97316', 'cta-hover': '#EA580C', bg: '#FAF5FF' } } } };
</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Inter', system-ui, sans-serif; transition: all 150ms ease; }
  body { background: #f5f3ff; }
  .sidebar { width: 220px; transition: width 200ms; }
  @media (max-width: 1024px) { .sidebar { width: 60px; } .sidebar .nav-text, .sidebar .logo-text { display: none; } .main-content { margin-left: 60px !important; } }
  .lead-row:hover { background: #faf5ff; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
  ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 2px; }
  .modal-overlay { background: rgba(0,0,0,0.喜好45); }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body class="min-h-screen">

<!-- Login Page -->
<div id="loginPage" class="min-h-screen flex items-center justify-center" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
  <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
    <div class="text-center mb-6">
      <div class="text-4xl mb-2">🔍</div>
      <h1 class="text-2xl font-bold text-primary">海外营销线索平台</h1>
      <p class="text-gray-500 text-sm mt-1">DeepSeek AI 智能线索识别</p>
    </div>
    <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-4">
      <div><input type="email" id="email" placeholder="邮箱" required class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-primary"></div>
      <div><input type="password" id="password" placeholder="密码" required class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-primary"></div>
      <button type="submit" class="w-full py-3 bg-primary text-white rounded-xl font-medium hover:bg-pri-dark transition-colors">登 录</button>
    </form>
    <p class="text-center text-gray-400 text-xs mt-4">测试账号: admin@marketing-leads.com / admin123</p>
  </div>
</div>

<!-- Main App (hidden initially) -->
<div id="mainApp" class="hidden">
  <!-- Sidebar -->
  <aside class="sidebar fixed top-0 left-0 h-full bg-white border-r border-gray-200 z-40 flex flex-col">
    <div class="h-16 flex items-center px-4 border-b border-gray-200">
      <span class="text-xl mr-2">🔍</span>
      <span class="logo-text font-bold text-primary text-lg">海外线索</span>
    </div>
    <nav class="flex-1 py-4 px-2 space-y-1">
      <a onclick="navigateTo('dashboard')" id="nav-dashboard" class="flex items-center px-3 py-2.5 rounded-lg bg-primary/10 text-primary font-medium cursor-pointer">
        <span class="mr-3">📊</span><span class="nav-text text-sm">线索看板</span>
      </a>
      <a onclick="navigateTo('keywords')" id="nav-keywords" class="flex items-center px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 font-medium cursor-pointer">
        <span class="mr-3">⚙️</span><span class="nav-text text-sm">关键词管理</span>
      </a>
    </nav>
    <div class="p-4 border-t border-gray-200">
      <div class="flex items-center gap-iat3">
        <div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center text-white text-sm font-semibold" id="userAvatar">管</div>
        <div class="nav-text"><div class="text-sm font-medium" id="userName">管理员</div></div>
      </div>
      <button onclick="logout()" class="mt-3 w-full text-xs text-gray-500 hover:text-red-500 cursor-pointer nav-text">退出登录</button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content" style="margin-left: 220px;">
    <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 sticky top-0 z-30">
      <h1 class="text-lg font-semibold text-gray-900" id="pageTitle">线索看板</h1>
      <button onclick="triggerCrawl()" class="px-4 py-2 text-sm font-medium text-white bg-cta hover:bg-cta-hover rounded-lg">+ 采集线索</button>
    </header>

    <!-- Dashboard Page -->
    <div id="page-dashboard" class="p-6">
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 mb-6" id="statsCards"></div>
      <div class="bg-white rounded-xl border border-gray-200 p-4 mb-6">
        <div class="flex flex-wrap items-center gap-3">
          <input type="text" id="searchInput" placeholder="搜索线索..." oninput="fetchLeads(1)" class="flex-1 min-w-[200px] px-4 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-primary">
          <select id="typeFilter" onchange="fetchLeads(1)" class="px-3 py-2 border border-gray-200 rounded-lg text-sm bg-white">
            <option value="">全部类型</option><option value="找资源">🔍 找资源</option><option value="咨询求助">❓ 咨询求助</option><option value="经验分享">💡 经验分享</option><option value="资源展示">📢 资源展示</option>
          </select>
          <select id="statusFilter" onchange="fetchLeads(1)" class="px-3 py-2 border border-gray-200 rounded-lg text-sm bg-white">
            <option value="">全部状态</option><option value="新线索">新线索</option><option value="已查看">已查看</option><option value="已联系">已联系</option><option value="已转化">已转化</option><option value="无效">无效</option>
          </select>
          <button onclick="resetFilters()" class="px-4 py-2 text-sm text-gray-500 border border-gray-200 rounded-lg hover:bg-gray-50">重置</button>
          <button onclick="exportCSV()" class="px-4 py-2 text-sm font-medium text-white bg-primary hover:bg-pri-dark rounded-lg">导出 Excel</button>
        </div>
      </div>
      <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
        <div class="overflow-x-auto"><table class="w-full" id="leadsTable"></table></div>
        <div class="flex items-center justify-between px-4 py-3 border-t border-gray-200" id="pagination"></div>
      </div>
    </div>

    <!-- Keywords Page -->
    <div id="page-keywords" class="p-6 hidden">
      <div class="bg-white rounded-xl border border-gray-200 p-6">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-lg font-semibold">关键词组管理</h2>
          <button onclick="showKeywordModal()" class="px-4 py-2 text-sm font-medium text-white bg-primary hover:bg-pri-dark rounded-lg">+ 新建关键词组</button>
        </div>
        <p class="text-gray-500 text-sm mb-4">配置关键词组合，系统将按关键词定时搜索小红书帖子，并通过 DeepSeek 自动识别海外营销线索。</p>
        <div class="overflow-x-auto"><table class="w-full" id="keywordsTable"></table></div>
      </div>
    </div>
  </main>
</div>

<!-- Detail Drawer -->
<div id="detailOverlay" class="fixed inset-0 modal-overlay hidden z-50" onclick="closeDetail()"></div>
<div id="detailDrawer" class="fixed top-0 right-0 h-full w-full max-w-2xl bg-white shadow-xl z-50 transform translate-x-full transition-transform duration-300 overflow-y-auto">
  <div class="sticky top-0 bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between">
    <h3 class="text-lg font-semibold" id="detailTitle">线索详情</h3>
    <button onclick="closeDetail()" class="p-2 text-gray-400 hover:text-gray-600 rounded-lg">✕</button>
  </div>
  <div class="p-6 space-y-6" id="detailContent"></div>
</div>

<!-- Keyword Modal -->
<div id="keywordModal" class="fixed inset-0 modal-overlay hidden z-50 flex items-center justify-center" onclick="closeKeywordModal()">
  <div class="bg-white rounded-xl p-6 w-full max-w-md shadow-xl" onclick="event.stopPropagation()">
    <h3 class="text-lg font-semibold mb-4">新建关键词组</h3>
    <form id="keywordForm" onsubmit="handleCreateKeyword(event)" class="space-y-4">
      <div><label class="block text-sm font-medium mb-1">名称</label><input type="text" id="kwName" required class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm"></div>
      <div><label class="block text-sm font-medium mb-1">搜索关键词（逗号分隔）</label><textarea id="kwKeywords" required class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" rows="3" placeholder="海外达人, 海外KOL"></textarea></div>
      <div><label class="block text-sm font-medium mb-1">排除词</label><input type="text" id="kwExclude" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" placeholder="招聘, 培训"></div>
      <div class="flex gap-3 justify-end pt-2">
        <button type="button" onclick="closeKeywordModal()" class="px-4 py-2 text-sm border border-gray-200 rounded-lg">取消</button>
        <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-primary hover:bg-pri-dark rounded-lg">创建</button>
      </div>
    </form>
  </div>
</div>

<!-- Toast -->
<div id="toastContainer" class="fixed top-4 right-4 z-[100] flex flex-col gap-2"></div>

<script>
const API = '/api';
let token = localStorage.getItem('token');
let currentPage = 'dashboard';
let leadPage = 1, leadTotal = 0;

// Auth
async function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  try {
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, password})
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail);
    token = data.access_token;
    localStorage.setItem('token', token);
    localStorage.setItem('user', JSON.stringify(data.user));
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('mainApp').classList.remove('hidden');
    document.getElementById('userName').textContent = data.user.nickname || '管理员';
    document.getElementById('userAvatar').textContent = (data.user.nickname || '管')[0];
    navigateTo('dashboard');
    showToast('登录成功', 'success');
  } catch(err) {
    showToast(err.message || '登录失败', 'error');
  }
}

function logout() {
  localStorage.removeItem('token'); localStorage.removeItem('user');
  document.getElementById('loginPage').classList.remove('hidden');
  document.getElementById('mainApp').classList.add('hidden');
}

function apiHeaders() { return token ? {'Authorization': `Bearer ${token}`} : {}; }

async function apiGet(path) {
  const res = await fetch(`${API}${path}`, { headers: apiHeaders() });
  if (res.status === 401) { logout(); throw new Error('登录已过期'); }
  return res.json();
}

async function apiPost(path, body) {
  const res = await fetch(`${API}${path}`, {
    method: 'POST', headers: {...apiHeaders(), 'Content-Type': 'application/json'}, body: JSON.stringify(body)
  });
  if (res.status === 401) { logout(); throw new Error('登录已过期'); }
  return res.json();
}

async function apiPut(path, body) {
  const res = await fetch(`${API}${path}`, {
    method: 'PUT', headers: {...apiHeaders(), 'Content-Type': 'application/json'}, body: JSON.stringify(body)
  });
  if (res.status === 401) { logout(); throw new Error('登录已过期'); }
  return res.json();
}

async function apiDelete(path) {
  const res = await fetch(`${API}${path}`, { method: 'DELETE', headers: apiHeaders() });
  if (res.status === 401) { logout(); throw new Error('登录已过期'); }
  return res.json();
}

function showToast(msg, type='success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `px-5 py-3 rounded-lg text-white text-sm font-medium shadow-lg transition-all ${type==='success'?'bg-green-500':'bg-red-500'}`;
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2500);
}

function navigateTo(page) {
  currentPage = page;
  document.querySelectorAll('[id^="page-"]').forEach(el => el.classList.add('hidden'));
  document.getElementById(`page-${page}`).classList.remove('hidden');
  document.querySelectorAll('[id^="nav-"]').forEach(el => { el.classList.remove('bg-primary/10', 'text-primary'); el.classList.add('text-gray-600'); });
  document.getElementById(`nav-${page}`).classList.add('bg-primary/10', 'text-primary');
  document.getElementById('pageTitle').textContent = page === 'dashboard' ? '线索看板' : '关键词管理';

  if (page === 'dashboard') fetchLeads(1);
  if (page === 'keywords') fetchKeywords();
}

// Dashboard
async function fetchLeads(page) {
  leadPage = page || 1;
  const keyword = document.getElementById('searchInput')?.value || '';
  const type = document.getElementById('typeFilter')?.value || '';
  const status = document.getElementById('statusFilter')?.value || '';
  const params = new URLSearchParams({ page: leadPage, page_size:20 });
  if (keyword) params.set('keyword', keyword);
  if (type) params.set('lead_type', type);
  if (status) params.set('status', status);

  try {
    const data = await apiGet(`/leads?${params}`);
    leadTotal = data.total;
    renderLeadsTable(data.items);
    renderPagination();
    fetchStats();
  } catch(err) { showToast('加载失败', 'error'); }
}

function fetchStats() {
  apiGet('/stats/dashboard').then(data => {
    document.getElementById('statsCards').innerHTML = [
      { label: '总线索数', value: data.total_leads || 0, color: '#7C3AED' },
      { label: '今日新增', value: data.today_new || 0, color: '#F97316' },
      { label: '待处理', value: (data.status_counts?.['新线索'] || 0), color: '#F59E0B' },
      { label: '已转化', value: (data.status_counts?.['已转化'] || 0), color: '#10B981' },
    ].map(s => `<div class="bg-white rounded-xl p-5 border border-gray-200">
      <div class="text-sm text-gray-500 mb-2">${s.label}</div>
      <div class="text-2xl font-bold text-gray-900">${s.value}</div>
    </div>`).join('');
  }).catch(() => {});
}

function renderLeadsTable(items) {
  const typeColors = {'找资源': 'text-orange-600 bg-orange-50', '咨询求助': 'text-blue-600 bg-blue-50', '经验分享': 'text-gray-600 bg-gray-100', '资源展示': 'text-purple-600 bg-purple-50'};
  const html = `
    <thead><tr class="bg-gray-50 text-left text-xs font-semibold text-gray-500 uppercase">
      <th class="px-4 py-3">帖子标题</th><th class="px-4 py-3 w-28">发布人</th><th class="px-4 py-3 w-24">线索类型</th><th class="px-4 py-3 w-20">置信度</th><th class="px-4 py-3 w-24">状态</th><th class="px-4 py-3 w-36">采集时间</th>
    </tr></thead>
    <tbody>${items.length === 0 ? `<tr><td colspan="6" class="text-center py-12 text-gray-400">暂无线索数据<br><span class="text-sm">点击右上角"采集线索"按钮开始采集</span></td></tr>` : items.map(item => `
      <tr class="lead-row border-b border-gray-100 cursor-pointer" onclick="openDetail(${item.id})">
        <td class="px-4 py-3"><div class="text-sm font-medium text-gray-900 line-clamp-1 max-w-[400px]">${item.title || '无标题'}</div></td>
        <td class="px-4 py-3 text-sm text-gray-600">${item.author || '-'}</td>
        <td class="px-4 py-3"><span class="px-2 py-0.5 rounded-full text-xs font-medium ${typeColors[item.lead_type] || ''}">${item.lead_type}</span></td>
        <td class="px-4 py-3"><span class="text-sm font-semibold" style="color:${item.confidence >= 0.9?'#10B981':'#F59E0B'}">${(item.confidence*100).toFixed(0)}%</span></td>
        <td class="px-4 py-3"><span class="status-dot" style="background:${item.status==='新线索'?'#3B82F6':item.status==='已转化'?'#10B981':item.status==='无效'?'#9CA3AF':'#F59E0B'}"></span><span class="text-xs">${item.status}</span></td>
        <td class="px-4 py-3 text-sm text-gray-500">${(item.created_at||'').slice(0,16).replace('T',' ')}</td>
      </tr>
    `).join('')}</tbody>`;
  document.getElementById('leadsTable').innerHTML = html;
}

function renderPagination() {
  const totalPages = Math.ceil(leadTotal / 20);
  let html = `<span class="text-sm text-gray-500">共 ${leadTotal} 条，第 ${leadPage}/${totalPages} 页</span><div class="flex gap-1">`;
  html += `<button onclick="fetchLeads(${leadPage-1})" ${leadPage<=1?'disabled':''} class="px-3 py-1.5 text-sm border rounded-lg hover:bg-gray-50 disabled:opacity-40">&lt;</button>`;
  for (let i = Math.max(1, leadPage-2); i <= Math.min(totalPages, leadPage+2); i++) {
    html += `<button onclick="fetchLeads(${i})" class="px-3 py-1.5 text-sm ${i===leadPage?'bg-primary text-white':'border hover:bg-gray-50'} rounded-lg">${i}</button>`;
  }
  html += `<button onclick="fetchLeads(${leadPage+1})" ${leadPage>=totalPages?'disabled':''} class="px-3 py-1.5 text-sm border rounded-lg hover:bg-gray-50 disabled:opacity-40">&gt;</button></div>`;
  document.getElementById('pagination').innerHTML = html;
}

function resetFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('typeFilter').value = '';
  document.getElementById('statusFilter').value = '';
  fetchLeads(1);
}

function exportCSV() { showToast('导出功能开发中...', 'success'); }

// Detail
async function openDetail(id) {
  try {
    const data = await apiGet(`/leads/${id}`);
    document.getElementById('detailTitle').textContent = data.post?.title || '线索详情';
    const typeColors = {'找资源': 'text-orange-600 bg-orange-50', '咨询求助': 'text-blue-600 bg-blue-50', '经验分享': 'text-gray-600 bg-gray-100', '资源展示': 'text-purple-600 bg-purple-50'};
    document.getElementById('detailContent').innerHTML = `
      <div>
        <div class="flex items-center gap-2 mb-4">
          <span class="px-2 py-0.5 rounded-full text-xs font-medium ${typeColors[data.lead_type] || ''}">${data.lead_type}</span>
          <span class="text-xs text-gray-500">置信度 <b style="color:${data.confidence>=0.9?'#10B981':'#F59E0B'}">${(data.confidence*100).toFixed(0)}%</span>
        </div>
        <div class="flex items-center gap-3 mb-4">
          <div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center text-primary text-sm font-semibold">${(data.post?.author||'?')[0]}</div>
          <div><div class="text-sm font-medium">${data.post?.author||'未知'}</div><div class="text-xs text-gray-500">${(data.created_at||'').slice(0,16)}</div></div>
          ${data.post?.permalink ? `<a href="${data.post.permalink}" target="_blank" class="ml-auto text-xs text-primary hover:underline">查看原文 →</a>` : ''}
        </div>
        <div class="bg-gray-50 rounded-lg p-4 mb-6 text-sm leading-relaxed whitespace-pre-line">${data.post?.content||'无内容'}</div>
      </div>
      <div class="bg-purple-50 rounded-lg p-4 mb-6 border border-purple-100">
        <div class="text-sm font-semibold text-purple-800 mb-2">🤖 DeepSeek AI 分析</div>
        <p class="text-sm text-purple-700">${data.reason||'暂无分析'}</p>
      </div>
      <div class="mb-6">
        <h4 class="text-sm font-semibold mb-iat3">状态更新</h4>
        <div class="flex gap-2">
          <select onchange="updateLeadStatus(${data.id}, this.value)" class="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-sm">
            ${['新线索','已查看','已联系','已转化','无效'].map(s => `<option ${data.status === s ? 'selected' : ''}>${s}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="mb-6">
        <h4 class="text-sm font-semibold mb-3">跟进记录</h4>
        ${data.follow_ups?.length === 0 ? '<p class="text-sm text-gray-400">暂无跟进记录</p>' : data.follow_ups.map(f => `<div class="text-sm mb-2"><span class="text-gray-400 text-xs">${(f.created_at||'').slice(0,16)}</span><p>${f.content}</p></div>`).join('')}
        <div class="flex gap-2 mt-3">
          <input type="text" id="followUpText" placeholder="添加跟进备注..." class="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-sm">
          <button onclick="addFollowUp(${data.id})" class="px-4 py-2 text-sm font-medium text-white bg-cta hover:bg-cta-hover rounded-lg">添加</button>
        </div>
      </div>
      <div>
        <h4 class="text-sm font-semibold mb-3">评论 (${data.comments?.length || 0})</h4>
        ${(data.comments||[]).map(c => `
          <div class="flex gap-3 mb-3">
            <div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center text-xs font-medium text-gray-600 flex-shrink-0">${c.author[0]}</div>
            <div><div class="text-sm font-medium">${c.author}</div><p class="text-sm text-gray-600">${c.content}</p></div>
          </div>
        `).join('')}
      </div>`;
    document.getElementById('detailDrawer').classList.remove('translate-x-full');
    document.getElementById('detailOverlay').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  } catch(err) { showToast('加载详情失败', 'error'); }
}

function closeDetail() {
  document.getElementById('detailDrawer').classList.add('translate-x-full');
  document.getElementById('detailOverlay').classList.add('hidden');
  document.body.style.overflow = '';
}

async function updateLeadStatus(id, status) {
  await apiPut(`/leads/${id}/status`, {status});
  showToast('状态已更新', 'success');
}

async function addFollowUp(id) {
  const text = document.getElementById('followUpText').value.trim();
  if (!text) return;
  await apiPost(`/leads/${id}/follow-ups`, {content: text});
  showToast('跟进记录已添加', 'success');
  openDetail(id);
}

// Keywords
async function fetchKeywords() {
  try {
    const data = await apiGet('/keywords');
    const items = Array.isArray(data) ? data : [];
    document.getElementById('keywordsTable').innerHTML = `
      <thead><tr class="bg-gray-50 text-left text-xs font-semibold text-gray-500 uppercase">
        <th class="px-4 py-3">名称</th><th class="px-4 py-3">关键词</th><th class="px-4 py-3 w-20">平台</th><th class="px-4 py-3 w-24">频率</th><th class="px-4 py-3 w-20">状态</th><th class="px-4 py-3 w-20">操作</th>
      </tr></thead>
      <tbody>${items.map(item => `
        <tr class="border-b border-gray-100">
          <td class="px-4 py-3 text-sm font-medium">${item.name}</td>
          <td class="px-4 py-3">${(item.keywords||[]).map(k => `<span class="px-2 py-0.5 rounded-full text-xs bg-purple-50 text-primary mr-1">${k}</span>`).join('')}</td>
          <td class="px-4 py-3 text-sm">${item.platform}</td>
          <td class="px-4 py-3 text-sm">${item.crawl_interval}</td>
          <td class="px-4 py-3"><span class="px-2 py-0.5 rounded-full text-xs ${item.is_active?'bg-green-50 text-green-700':'bg-gray-100 text-gray-500'}">${item.is_active?'运行中':'已停用'}</span></td>
          <td class="px-4 py-3"><button onclick="deleteKeyword(${item.id})" class="text-red-500 hover:text-red-700 text-sm">删除</button></td>
        </tr>
      `).join('')}</tbody>`;
  } catch(err) { showToast('加载失败', 'error'); }
}

function showKeywordModal() { document.getElementById('keywordModal').classList.remove('hidden'); }
function closeKeywordModal() { document.getElementById('keywordModal').classList.add('hidden'); }

async function handleCreateKeyword(e) {
  e.preventDefault();
  const name = document.getElementById('kwName').value;
  const keywords = document.getElementById('kwKeywords').value.split(',').map(s => s.trim()).filter(Boolean);
  const exclude = document.getElementById('kwExclude').value.split(',').map(s => s.trim()).filter(Boolean);
  await apiPost('/keywords', {name, keywords, exclude_keywords: exclude, platform: 'xiaohongshu', crawl_interval: 'daily'});
  showToast('关键词组已创建', 'success');
  closeKeywordModal();
  fetchKeywords();
}

async function deleteKeyword(id) {
  if (!confirm('确定删除？')) return;
  await apiDelete(`/keywords/${id}`);
  showToast('已删除', 'success');
  fetchKeywords();
}

async function triggerCrawl() {
  try {
    const groups = await apiGet('/keywords');
    if (!Array.isArray(groups) || groups.length === 0) { showToast('请先创建关键词组', 'error'); return; }
    const active = groups.filter(g => g.is_active);
    if (active.length === 0) { showToast('没有运行中的关键词组', 'error'); return; }
    await apiPost(`/crawl/${active[0].id}`, {});
    showToast('采集任务已触发，请稍后刷新查看结果', 'success');
    setTimeout(() => { if (currentPage === 'dashboard') fetchLeads(1); }, 5000);
  } catch(err) { showToast('触发采集失败', 'error'); }
}

// Init
(function() {
  if (token) {
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('mainApp').classList.remove('hidden');
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    document.getElementById('userName').textContent = user.nickname || '管理员';
    document.getElementById('userAvatar').textContent = (user.nickname || '管')[0];
    navigateTo('dashboard');
  }
})();
</script>
